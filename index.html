<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GevoelsAtlas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F7F5EE">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GevoelsAtlas">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/jpeg" href="images/1258_groen_intelligent.jpg">
<style>
/* ── TOKENS ─────────────────────────────────────────────────── */
:root {
  --bg:      #F7F5EE;
  --paper:   #FFFCF5;
  --ink:     #111111;
  --soft:    #555555;
  --muted:   #BBBBBB;
  --accent:  #FF5C35;
  --yellow:  #FFD93D;
  --radius:  10px;
  --border:  2.5px solid #111111;
  --shadow:  3px 3px 0 #111111;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--ink); }

/* ── NAV ─────────────────────────────────────────────────────── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--ink); padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  height: 54px; border-bottom: 3px solid var(--accent);
}
.nav-logo { font-family: 'Amatic SC', cursive; font-size: 1.6rem; font-weight: 700; line-height: 1; color: white; text-decoration: none; }
.nav-logo em { color: var(--yellow); font-style: normal; }
.hamburger { background: none; border: none; cursor: pointer; padding: 6px; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
.hamburger span { display: block; width: 20px; height: 2px; background: white; border-radius: 1px; }
.nav-menu { display: none; position: fixed; top: 57px; right: 20px; background: var(--ink); min-width: 180px; z-index: 200; border-top: 3px solid var(--accent); border-bottom: 1px solid rgba(255,255,255,0.12); box-shadow: 4px 4px 0 rgba(0,0,0,0.3); }
.nav-menu.open { display: block; }
.nav-menu a { display: block; padding: 12px 24px; color: rgba(255,255,255,0.65); text-decoration: none; font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 800; letter-spacing: 0.04em; transition: color 0.12s; }
.nav-menu a:hover { color: var(--yellow); }

/* ── STAP-SCHERM ─────────────────────────────────────────────── */
#step-screen {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 0 32px;
}

/* Progress strip */
.progress-strip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 18px 20px 0;
}
.prog-dot {
  width: 13px; height: 13px;
  border-radius: 50%;
  border: 2.5px solid var(--ink);
  background: transparent;
  transition: background 0.25s, transform 0.25s, border-color 0.25s, box-shadow 0.25s;
  flex-shrink: 0;
  cursor: default;
  padding: 0;
  appearance: none;
  -webkit-appearance: none;
  font: inherit;
}
.prog-dot.done {
  background: var(--ink);
  cursor: pointer;
}
.prog-dot.done:hover {
  background: var(--accent);
  border-color: var(--accent);
  transform: scale(1.2);
}
.prog-dot.active {
  background: var(--accent);
  border-color: var(--accent);
  transform: scale(1.45);
  box-shadow: 0 0 0 3px rgba(255,92,53,0.18);
  cursor: default;
}
.prog-label {
  margin-left: auto;
  font-size: 0.7rem;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 0.04em;
}
.menu-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3.5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 2px 4px 8px;
  text-decoration: none;
  flex-shrink: 0;
}
.menu-btn span {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--muted);
  display: block;
  transition: background 0.15s;
}
.menu-btn:hover span { background: var(--ink); }

/* Question block */
.question-block {
  padding: 20px 20px 12px;
  text-align: center;
}
.question-theme {
  font-size: 0.65rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  margin-bottom: 6px;
}
.question-txt {
  font-family: 'Amatic SC', cursive;
  font-size: clamp(1.8rem, 6vw, 2.6rem);
  font-weight: 700;
  line-height: 1.2;
  color: var(--ink);
}

/* Notitie per stap */
.step-note-toggle {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 10px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-size: 0.68rem;
  font-weight: 800;
  color: var(--muted);
  padding: 0;
  transition: color 0.15s;
  letter-spacing: 0.03em;
}
.step-note-toggle:hover { color: var(--ink); }
.step-note-toggle.open  { color: var(--accent); }
.step-note-area {
  display: none;
  margin: 8px 0 0;
}
.step-note-area.open { display: block; }
.step-note-area textarea {
  width: 100%;
  padding: 9px 12px;
  border: 2px solid var(--muted);
  border-radius: var(--radius);
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--ink);
  background: var(--paper);
  resize: none;
  outline: none;
  height: 72px;
  transition: border-color 0.15s;
}
.step-note-area textarea:focus { border-color: var(--accent); }

/* Category chips */
.cat-strip {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 7px;
  padding: 0 20px 16px;
  flex-shrink: 0;
}
.cat-chip {
  flex-shrink: 0;
  padding: 6px 16px;
  border-radius: 8px;
  border: 2px solid var(--ink);
  background: var(--paper);
  font-family: 'Nunito', sans-serif;
  font-size: 0.72rem;
  font-weight: 800;
  cursor: pointer;
  color: var(--ink);
  transition: all 0.12s;
  white-space: nowrap;
  box-shadow: 2px 2px 0 var(--ink);
}
.cat-chip:hover  { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
.cat-chip.active { background: var(--accent); color: white; border-color: var(--accent); transform: translate(2px, 2px); box-shadow: none; }

/* Image grid */
.img-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
  padding: 0 20px;
  flex: 1;
}
@media (min-width: 480px) {
  .img-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; padding: 0 20px; }
}

/* Image card */
.img-card {
  border-radius: 8px;
  overflow: hidden;
  border: var(--border);
  cursor: pointer;
  background: white;
  box-shadow: var(--shadow);
  transition: transform 0.13s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.13s;
  position: relative;
}
.img-card:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }
.img-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.img-label {
  padding: 4px 7px 5px;
  font-size: 0.63rem;
  font-weight: 700;
  text-align: center;
  text-transform: capitalize;
  border-top: 2px solid var(--ink);
  background: white;
  line-height: 1.2;
}

/* Klik-flash animatie */
@keyframes flash-select {
  0%   { transform: translate(-2px,-2px) scale(1); box-shadow: 5px 5px 0 var(--accent); }
  50%  { transform: scale(1.06); box-shadow: 7px 7px 0 var(--accent); border-color: var(--accent); }
  100% { transform: translate(1px,1px) scale(0.97); box-shadow: 1px 1px 0 var(--accent); }
}
.img-card.selecting {
  animation: flash-select 0.22s ease-out forwards;
  border-color: var(--accent);
  z-index: 10;
}

/* Meer-knop */
.meer-btn {
  display: block;
  margin: 14px 14px 0;
  padding: 11px;
  border: var(--border);
  border-radius: var(--radius);
  background: var(--paper);
  font-family: 'Nunito', sans-serif;
  font-size: 0.75rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: all 0.12s;
  text-align: center;
  color: var(--ink);
}
.meer-btn:hover { transform: translate(-1px, -2px); box-shadow: 4px 5px 0 var(--ink); }
@media (min-width: 480px) { .meer-btn { margin: 14px 20px 0; } }

/* ── STAP-OVERGANG ───────────────────────────────────────────── */
#step-overlay {
  position: fixed; inset: 0; z-index: 800;
  background: var(--yellow);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
#step-overlay.active { opacity: 1; pointer-events: all; }
#step-overlay-txt {
  font-family: 'Amatic SC', cursive;
  font-size: clamp(2.5rem, 10vw, 4.5rem);
  font-weight: 700;
  color: var(--ink);
  text-align: center;
  padding: 0 24px;
  line-height: 1.2;
}

/* ── EINDSCHERM ──────────────────────────────────────────────── */
#end-screen {
  display: none;
  min-height: 100dvh;
  background: var(--bg);
  padding: 32px 20px 60px;
  max-width: 680px;
  margin: 0 auto;
}

.end-header {
  text-align: center;
  margin-bottom: 28px;
}
.end-title {
  font-family: 'Amatic SC', cursive;
  font-size: clamp(1.9rem, 7vw, 2.8rem);
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 4px;
}
.end-title em { color: var(--accent); font-style: normal; }
.end-date {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--soft);
  letter-spacing: 0.04em;
}

/* 5 gekozen gezichtjes */
.chosen-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 28px;
}
@media (max-width: 380px) {
  .chosen-grid { grid-template-columns: repeat(3, 1fr); }
}
.chosen-card {
  background: var(--paper);
  border: var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  text-align: center;
}
.chosen-card img {
  width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
  border-bottom: 2px solid var(--ink);
}
.chosen-card-lbl {
  padding: 4px 5px;
  font-size: 0.58rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--accent);
  line-height: 1.2;
}
.chosen-card-emotion {
  padding: 2px 5px 5px;
  font-family: 'Amatic SC', cursive;
  font-size: 1rem;
  font-weight: 700;
  text-transform: capitalize;
  color: var(--ink);
  line-height: 1.1;
}
.chosen-card-note {
  padding: 4px 6px 6px;
  font-size: 0.58rem;
  font-style: italic;
  color: var(--soft);
  line-height: 1.4;
  border-top: 1px solid #eee;
}
.chosen-card.empty {
  background: var(--bg);
  border: 2px dashed var(--muted);
  box-shadow: none;
  display: flex; align-items: center; justify-content: center;
  min-height: 80px;
}
.chosen-card.empty span { font-size: 1.4rem; color: var(--muted); }

/* Optionele velden */
.end-fields {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 28px;
}
.field-label {
  font-size: 0.65rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--soft);
  margin-bottom: 5px;
}
.end-fields input,
.end-fields textarea {
  width: 100%;
  padding: 10px 14px;
  border: var(--border);
  border-radius: var(--radius);
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--ink);
  background: var(--paper);
  outline: none;
  transition: border-color 0.15s;
  resize: none;
}
.end-fields input:focus,
.end-fields textarea:focus { border-color: var(--accent); }
.end-fields input::placeholder,
.end-fields textarea::placeholder { color: var(--muted); font-weight: 400; }
.end-fields textarea { height: 90px; }

/* Acties */
.end-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.btn-primary {
  width: 100%;
  padding: 15px 20px;
  background: var(--ink);
  color: white;
  border: var(--border);
  border-radius: var(--radius);
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  font-weight: 900;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: all 0.12s;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn-primary:hover { background: var(--accent); border-color: var(--accent); transform: translate(-1px,-2px); box-shadow: 4px 5px 0 var(--ink); }
.btn-secondary {
  width: 100%;
  padding: 13px 20px;
  background: transparent;
  color: var(--ink);
  border: 2px solid var(--ink);
  border-radius: var(--radius);
  font-family: 'Nunito', sans-serif;
  font-size: 0.82rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.12s;
  letter-spacing: 0.04em;
  box-shadow: 2px 2px 0 var(--ink);
}
.btn-secondary:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
.dagboek-btn-sub {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.03em;
  color: rgba(255,255,255,0.65); text-transform: none;
  margin-top: 4px;
}
.btn-pdf-link {
  display: block; text-align: center;
  font-size: 0.78rem; font-weight: 800;
  color: var(--soft); text-decoration: underline;
  cursor: pointer; background: none; border: none;
  padding: 4px 0;
}
.btn-pdf-link:hover { color: var(--ink); }
.btn-tertiary {
  display: block; width: 100%; text-align: center;
  font-family: 'Nunito', sans-serif;
  font-size: 0.75rem; font-weight: 700;
  color: var(--muted); background: none; border: none;
  cursor: pointer; padding: 4px 0; margin-top: 2px;
  transition: color 0.12s;
}
.btn-tertiary:hover { color: var(--ink); }
.end-terugkom {
  background: var(--yellow); border: var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 14px 18px; text-align: center;
  font-family: 'Amatic SC', cursive;
  font-size: 1.2rem; font-weight: 700; color: var(--ink);
  line-height: 1.5;
}
.end-terugkom a { color: var(--accent); font-weight: 900; text-decoration: none; }
.end-terugkom a:hover { text-decoration: underline; }

/* ── PRINT / PDF ─────────────────────────────────────────────── */
#print-view { display: none; }

@page { margin: 12mm 10mm; size: A4 portrait; }

@media print {
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body > *:not(#print-view) { display: none !important; }

  #print-view {
    display: block !important;
    font-family: 'Nunito', sans-serif;
    color: #111111;
  }

  .pv-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 2.5px solid #111111;
    padding-bottom: 8px;
    margin-bottom: 6px;
  }
  .pv-title {
    font-family: 'Amatic SC', cursive;
    font-size: 2.2rem;
    font-weight: 700;
    color: #111111;
    line-height: 1;
  }
  .pv-title em { color: #FF5C35; font-style: normal; }
  .pv-subtitle {
    font-size: 0.7rem;
    color: #666;
    font-weight: 700;
    font-style: italic;
    margin-bottom: 12px;
  }
  .pv-date { font-size: 0.72rem; font-weight: 700; color: #666; }

  .pv-name {
    font-size: 0.75rem;
    font-weight: 800;
    color: #111111;
    margin-bottom: 16px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* 5 gezichtjes als grid */
  .pv-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .pv-card {
    border: 2.5px solid #111111;
    border-radius: 8px;
    overflow: hidden;
    break-inside: avoid;
    background: white;
  }
  .pv-card img {
    width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
    border-bottom: 2px solid #111111;
  }
  .pv-card-lbl {
    padding: 3px 5px;
    font-size: 0.52rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #FF5C35;
  }
  .pv-card-emotion {
    padding: 1px 5px 4px;
    font-family: 'Amatic SC', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: capitalize;
    color: #111111;
    line-height: 1.1;
  }
  .pv-card-note {
    padding: 3px 5px 5px;
    font-size: 0.52rem;
    font-style: italic;
    color: #666666;
    line-height: 1.4;
    border-top: 1px solid #eeeeee;
  }

  /* Notitie-sectie */
  .pv-note-section {
    border: 2px solid #111111;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 16px;
    background: #FFFCF5;
  }
  .pv-note-lbl {
    font-size: 0.6rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #FF5C35;
    margin-bottom: 5px;
  }
  .pv-note-txt {
    font-size: 0.8rem;
    font-weight: 600;
    color: #111111;
    line-height: 1.6;
    font-style: italic;
    min-height: 28px;
  }

  /* Lege ruimte voor handmatige notitie */
  .pv-blank {
    border: 2px solid #ccc;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 16px;
    min-height: 55px;
  }
  .pv-blank-lbl {
    font-size: 0.6rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999;
    margin-bottom: 4px;
  }

  .pv-footer {
    font-size: 0.62rem;
    color: #999;
    font-weight: 700;
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
}

@media (min-width: 900px) {
  #step-screen { max-width: 960px; }
  .img-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  #end-screen { max-width: 860px; }
  .chosen-grid { grid-template-columns: repeat(5, 1fr); gap: 14px; }
}
@media (min-width: 1200px) {
  #step-screen { max-width: 1200px; }
  .img-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Gevoels<em>Atlas</em></a>
  <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>
<div class="nav-menu" id="navMenu">
  <a href="verken.html">Verkennen</a>
  <a href="dagboek.html">Dagboek</a>
  <a href="about.html">Over de atlas</a>
</div>

<!-- ── STAP-SCHERM ──────────────────────────────────────────── -->
<div id="step-screen">
  <div class="progress-strip" id="progressStrip"></div>
  <div class="question-block">
    <div class="question-theme" id="questionTheme"></div>
    <div class="question-txt"  id="questionTxt"></div>
    <button class="step-note-toggle" id="noteToggle" onclick="toggleStepNote()">✎ aantekening toevoegen</button>
    <div class="step-note-area" id="stepNoteArea">
      <textarea id="stepNoteInput" placeholder="Iets wat je wilt onthouden bij deze vraag…"></textarea>
    </div>
  </div>
  <div class="cat-strip" id="catStrip"></div>
  <div class="img-grid" id="imgGrid"></div>
  <button class="meer-btn" id="meerBtn" onclick="loadMoreAlles()">+ Toon nog 60 meer</button>
</div>

<!-- ── STAP-OVERGANG ────────────────────────────────────────── -->
<div id="step-overlay">
  <div id="step-overlay-txt"></div>
</div>

<!-- ── EINDSCHERM ───────────────────────────────────────────── -->
<div id="end-screen">
  <div class="end-header">
    <div class="end-title">Jouw Gevoels<em>Atlas</em><br>van dit moment</div>
    <div class="end-date" id="endDate"></div>
  </div>

  <div class="chosen-grid" id="chosenGrid"></div>

  <div class="end-fields">
    <div>
      <div class="field-label">Wil je iets toevoegen?</div>
      <textarea id="endNote" placeholder="Een gedachte, een gevoel, iets wat je wilt onthouden…"></textarea>
    </div>
    <div>
      <div class="field-label">Naam (optioneel)</div>
      <input type="text" id="endName" placeholder="Bijv. Lena…">
    </div>
  </div>

  <div class="end-actions">
    <button class="btn-primary" id="btnDagboek" onclick="slaOpInDagboek()">
      <img src="icons/dagboek_logo.png" alt="" style="height:1.2em;vertical-align:middle;margin-right:6px;">

const STEPS = [
  { label: 'Nu',          theme: 'Hoe voel jij je?',     question: 'Wat past bij hoe jij je nu voelt?' },
  { label: 'Vanbinnen',   theme: 'Vanbinnen',             question: 'Hoe voel je je vanbinnen?' },

  { label: 'Wens',        theme: 'Jouw wens',             question: 'Hoe zou je je willen voelen?' },
];

const CATS = [
  { id: 'alles',          label: 'Alles' },
  { id: 'blij',           label: 'Blij' },
  { id: 'zelfverzekerd',  label: 'Zelfverzekerd' },
  { id: 'rustig',         label: 'Rustig' },
  { id: 'nieuwsgierig',   label: 'Nieuwsgierig' },
  { id: 'speels',         label: 'Speels' },
  { id: 'boos',           label: 'Boos' },
  { id: 'bang',           label: 'Bang' },
  { id: 'verdrietig',     label: 'Verdrietig' },
  { id: 'verward',        label: 'Verward' },
  { id: 'moe',            label: 'Moe' },
  { id: 'onzeker',        label: 'Onzeker' },
  { id: 'ongemakkelijk',  label: 'Ongemakkelijk' },
  { id: 'uiterlijk',      label: 'Uiterlijk' },
  { id: 'overig',         label: 'Overig' },
];

const PAGE_ALLES = 60; // startaantal bij "Alles"
const PAGE_MORE  = 60; // extra per keer bijladen

/* ── STATE ──────────────────────────────────────────────────── */
var currentStep     = 0;
var sessionLog      = []; // [{step, img}]
var activeCat       = 'alles';
var shuffled        = [];
var allesLimit      = PAGE_ALLES; // hoeveel er bij "Alles" getoond worden
var isTransitioning = false;

/* ── INIT ───────────────────────────────────────────────────── */
function init() {
  renderProgress();
  renderStep();
}

/* ── PROGRESS DOTS ──────────────────────────────────────────── */
function renderProgress() {
  var html = '';
  STEPS.forEach(function(s, i) {
    var cls = i < currentStep ? 'done' : (i === currentStep ? 'active' : '');
    if (i < currentStep) {
      html += '<button class="prog-dot ' + cls + '" onclick="goToStep(' + i + ')" title="Terug naar: ' + s.label + '"></button>';
    } else {
      html += '<div class="prog-dot ' + cls + '" title="' + s.label + '"></div>';
    }
  });
  html += '<span class="prog-label">' + (currentStep + 1) + ' / ' + STEPS.length + '</span>';
  // menu-btn removed — now handled by hamburger in nav
  document.getElementById('progressStrip').innerHTML = html;
}

/* ── NAAR STAP ──────────────────────────────────────────────── */
function goToStep(i) {
  if (isTransitioning || i >= currentStep) return;
  isTransitioning = true;
  currentStep = i;
  renderProgress();
  renderStep();
  window.scrollTo(0, 0);
  isTransitioning = false;
}

/* ── NOTITIE TOGGLE ─────────────────────────────────────────── */
function toggleStepNote() {
  var area   = document.getElementById('stepNoteArea');
  var toggle = document.getElementById('noteToggle');
  var open   = area.classList.toggle('open');
  toggle.classList.toggle('open', open);
  toggle.textContent = open ? '✎ aantekening verbergen' : '✎ aantekening toevoegen';
  if (open) document.getElementById('stepNoteInput').focus();
}

function saveStepNote() {
  if (sessionLog[currentStep]) {
    sessionLog[currentStep].note = document.getElementById('stepNoteInput').value.trim();
  }
}

/* ── STAP RENDEREN ──────────────────────────────────────────── */
function renderStep() {
  var step = STEPS[currentStep];
  document.getElementById('questionTheme').textContent = step.theme;
  document.getElementById('questionTxt').textContent   = step.question;

  // Herstel notitie als gebruiker terugkomt
  var savedNote = (sessionLog[currentStep] && sessionLog[currentStep].note) || '';
  var input  = document.getElementById('stepNoteInput');
  var area   = document.getElementById('stepNoteArea');
  var toggle = document.getElementById('noteToggle');
  input.value = savedNote;
  if (savedNote) {
    area.classList.add('open');
    toggle.classList.add('open');
    toggle.textContent = '✎ aantekening verbergen';
  } else {
    area.classList.remove('open');
    toggle.classList.remove('open');
    toggle.textContent = '✎ aantekening toevoegen';
  }

  activeCat  = 'alles';
  allesLimit = PAGE_ALLES;
  renderCatStrip();
  buildShuffled();
  renderGrid();
}

/* ── CATEGORIE-CHIPS ────────────────────────────────────────── */
function renderCatStrip() {
  var html = '';
  CATS.forEach(function(c) {
    // Toon alleen als er images zijn, of 'alles'
    var count = c.id === 'alles' ? IMAGES.length : IMAGES.filter(function(i){ return i.cat === c.id; }).length;
    if (count === 0) return;
    var active = activeCat === c.id ? ' active' : '';
    html += '<button class="cat-chip' + active + '" onclick="setCat(\'' + c.id + '\')">' + c.label + '</button>';
  });
  document.getElementById('catStrip').innerHTML = html;
  // Scroll actieve chip in beeld
  var strip = document.getElementById('catStrip');
  var activeChip = strip.querySelector('.active');
  if (activeChip) {
    activeChip.scrollIntoView({ inline: 'nearest', behavior: 'smooth', block: 'nearest' });
  }
}

function setCat(id) {
  activeCat  = id;
  allesLimit = PAGE_ALLES;
  renderCatStrip();
  buildShuffled();
  renderGrid();
}

/* ── SHUFFLE + POOL ─────────────────────────────────────────── */
function buildShuffled() {
  var pool = activeCat === 'alles'
    ? IMAGES.slice()
    : IMAGES.filter(function(i) { return i.cat === activeCat; });
  // Fisher-Yates shuffle
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  shuffled = pool;
}

/* ── GRID RENDEREN ──────────────────────────────────────────── */
function renderGrid() {
  var isAlles  = activeCat === 'alles';
  var limit    = isAlles ? allesLimit : shuffled.length; // categorie = alles tonen
  var visible  = shuffled.slice(0, limit);
  var html = '';
  visible.forEach(function(img) {
    html += '<div class="img-card" onclick="selectImg(\'' + encodeURIComponent(img.filename) + '\')">';
    html += '<img src="' + img.url + '" alt="' + img.emotion + '" loading="lazy">';
    html += '<div class="img-label">' + img.emotion + '</div>';
    html += '</div>';
  });
  document.getElementById('imgGrid').innerHTML = html;

  var meerBtn = document.getElementById('meerBtn');
  if (isAlles && shuffled.length > allesLimit) {
    meerBtn.textContent = '+ Toon nog 60 meer';
    meerBtn.style.display = '';
  } else {
    meerBtn.style.display = 'none';
  }
}

function shuffleGrid() {
  allesLimit = PAGE_ALLES;
  buildShuffled();
  renderGrid();
}

function loadMoreAlles() {
  allesLimit += PAGE_MORE;
  renderGrid();
  window.scrollTo({ top: document.getElementById('meerBtn').offsetTop - 40, behavior: 'smooth' });
}

/* ── KLIK OP GEZICHTJE ──────────────────────────────────────── */
function selectImg(encodedFilename) {
  if (isTransitioning) return;
  isTransitioning = true;

  var filename = decodeURIComponent(encodedFilename);
  var img = IMAGES.find(function(i) { return i.filename === filename; });
  if (!img) { isTransitioning = false; return; }

  // Visuele flash op de kaart
  var cards = document.querySelectorAll('.img-card');
  cards.forEach(function(card) {
    var cardImg = card.querySelector('img');
    if (cardImg && cardImg.alt === img.emotion && cardImg.src.includes(img.filename)) {
      card.classList.add('selecting');
    }
  });

  // Sla op in sessie (inclusief eventuele notitie)
  var note = document.getElementById('stepNoteInput').value.trim();
  sessionLog[currentStep] = { step: currentStep, img: img, note: note };

  // Na 220ms: ga door
  setTimeout(function() {
    if (currentStep < STEPS.length - 1) {
      showStepOverlay(currentStep + 1);
    } else {
      showEndScreen();
    }
  }, 220);
}

/* ── STAP-OVERGANG OVERLAY ──────────────────────────────────── */
function showStepOverlay(nextStep) {
  var nextLabel = STEPS[nextStep].theme;
  var overlay = document.getElementById('step-overlay');
  document.getElementById('step-overlay-txt').textContent = nextLabel;
  overlay.classList.add('active');
  setTimeout(function() {
    currentStep = nextStep;
    renderProgress();
    renderStep();
    // Scroll naar boven
    window.scrollTo(0, 0);
    setTimeout(function() {
      overlay.classList.remove('active');
      isTransitioning = false;
    }, 280);
  }, 420);
}

/* ── EINDSCHERM ─────────────────────────────────────────────── */
function showEndScreen() {
  document.getElementById('step-screen').style.display = 'none';
  var end = document.getElementById('end-screen');
  end.style.display = 'block';
  window.scrollTo(0, 0);

  // Datum
  var d = new Date().toLocaleDateString('nl-NL', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  document.getElementById('endDate').textContent = d;

  // Gekozen gezichtjes grid
  var html = '';
  STEPS.forEach(function(s, i) {
    var entry = sessionLog[i];
    if (entry) {
      html += '<div class="chosen-card">';
      html += '<img src="' + entry.img.url + '" alt="' + entry.img.emotion + '">';
      html += '<div class="chosen-card-lbl">' + s.label + '</div>';
      html += '<div class="chosen-card-emotion">' + entry.img.emotion + '</div>';
      if (entry.note) html += '<div class="chosen-card-note">' + entry.note + '</div>';
      html += '</div>';
    } else {
      html += '<div class="chosen-card empty"><span>—</span></div>';
    }
  });
  document.getElementById('chosenGrid').innerHTML = html;
  isTransitioning = false;
}

/* ── DAGBOEK OPSLAAN ────────────────────────────────────────── */
function slaOpInDagboek() {
  var naam    = document.getElementById('endName').value.trim();
  var notitie = document.getElementById('endNote').value.trim();
  var stappen = STEPS.map(function(s, i) {
    var e = sessionLog[i];
    return e ? { label: s.label, url: e.img.url, emotion: e.img.emotion, note: e.note || '' } : null;
  }).filter(Boolean);
  if (stappen.length === 0) return;

  var sessie = { version: 1, datum: new Date().toISOString(), naam: naam, notitie: notitie, stappen: stappen };
  var bestaand = [];
  try { bestaand = JSON.parse(localStorage.getItem('gevoelsatlas_dagboek') || '[]'); } catch(e) {}
  bestaand.unshift(sessie);
  localStorage.setItem('gevoelsatlas_dagboek', JSON.stringify(bestaand));

  document.getElementById('btnDagboek').innerHTML = '<img src="icons/dagboek_logo.png" alt="" style="height:1.2em;vertical-align:middle;margin-right:6px;"> ✓ Opgeslagen';
  document.getElementById('btnDagboek').disabled = true;
  document.getElementById('terugkomMsg').style.display = 'block';
}

/* ── OPNIEUW BEGINNEN ───────────────────────────────────────── */
function opnieuwBeginnen() {
  currentStep  = 0;
  sessionLog   = [];
  activeCat    = 'alles';
  isTransitioning = false;
  document.getElementById('end-screen').style.display  = 'none';
  document.getElementById('step-screen').style.display = '';
  document.getElementById('endNote').value = '';
  document.getElementById('endName').value = '';
  var btnD = document.getElementById('btnDagboek');
  btnD.innerHTML = '<img src="icons/dagboek_logo.png" alt="" style="height:1.2em;vertical-align:middle;margin-right:6px;"> Bewaar in mijn dagboek<div class="dagboek-btn-sub">zie hoe je gevoel verandert over tijd</div>';
  btnD.disabled = false;
  document.getElementById('terugkomMsg').style.display = 'none';
  renderProgress();
  renderStep();
  window.scrollTo(0, 0);
}

/* ── PDF EXPORT ─────────────────────────────────────────────── */
function exportPDF() {
  var note = document.getElementById('endNote').value.trim();
  var name = document.getElementById('endName').value.trim();
  var d    = new Date().toLocaleDateString('nl-NL', { day:'2-digit', month:'long', year:'numeric' });

  var pv = document.getElementById('print-view');
  var html = '';

  // Header
  html += '<div class="pv-head">';
  html += '<div class="pv-title">Gevoels<em>Atlas</em></div>';
  html += '<div class="pv-date">' + d + '</div>';
  html += '</div>';
  html += '<div class="pv-subtitle">Een momentopname</div>';
  if (name) html += '<div class="pv-name">' + name + '</div>';

  // 5 gezichtjes
  html += '<div class="pv-grid">';
  STEPS.forEach(function(s, i) {
    var entry = sessionLog[i];
    if (entry) {
      html += '<div class="pv-card">';
      html += '<img src="' + entry.img.url + '" alt="' + entry.img.emotion + '">';
      html += '<div class="pv-card-lbl">' + s.label + '</div>';
      html += '<div class="pv-card-emotion">' + entry.img.emotion + '</div>';
      if (entry.note) html += '<div class="pv-card-note">' + entry.note + '</div>';
      html += '</div>';
    } else {
      html += '<div class="pv-card" style="min-height:80px"></div>';
    }
  });
  html += '</div>';

  // Algemene notitie eindscherm
  if (note) {
    html += '<div class="pv-note-section">';
    html += '<div class="pv-note-lbl">Aantekening</div>';
    html += '<div class="pv-note-txt">' + note + '</div>';
    html += '</div>';
  } else {
    html += '<div class="pv-blank"><div class="pv-blank-lbl">Aantekening</div></div>';
  }

  html += '<div class="pv-footer">gevoelsatlas.nl, een momentopname</div>';

  pv.innerHTML = html;

  // Wacht op afbeeldingen, dan printen
  var imgs  = pv.querySelectorAll('img');
  var total = imgs.length;
  var loaded = 0;
  var origTitle = document.title;
  document.title = name ? 'GevoelsAtlas · ' + name : 'GevoelsAtlas';

  function tryPrint() {
    loaded++;
    if (loaded >= total) { window.print(); document.title = origTitle; }
  }
  if (!total) { window.print(); document.title = origTitle; return; }
  imgs.forEach(function(img) {
    if (img.complete) tryPrint();
    else { img.onload = tryPrint; img.onerror = tryPrint; }
  });
}

init();
document.getElementById('hamburger').addEventListener('click', function(e) {
  e.stopPropagation();
  document.getElementById('navMenu').classList.toggle('open');
});
document.addEventListener('click', function() {
  document.getElementById('navMenu').classList.remove('open');
});
</script>
