<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GevoelsAtlas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
<style>
/* ── DESIGN LANGUAGE ───────────────────────────────────────────
   Bold black outlines. Flat saturated colour blocks.
   Handdrawn energy. White space as breathing room for the
   therapeutic context. Chunky, friendly, never clinical.
──────────────────────────────────────────────────────────────── */
:root {
  --bg:       #F7F5EE;
  --paper:    #FFFCF5;
  --ink:      #111111;
  --ink-soft: #444444;
  --border:   2.5px solid #111111;
  --border-thick: 3.5px solid #111111;
  --radius:   8px;
  --accent:   #FF5C35;   /* warm red-orange — matches the drawings' energy */
  --accent2:  #FFD93D;   /* yellow highlight */
  --muted:    #C8C2B4;
  --shadow:   4px 4px 0px #111111;
  --shadow-lg: 6px 6px 0px #111111;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: grid;
  grid-template-rows: 58px 1fr;
  grid-template-columns: 248px 1fr 284px;
  height: 100vh;
}

/* ── HEADER ──────────────────────────────────────────────────── */
header {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  background: var(--ink);
  border-bottom: var(--border-thick);
}

.logo {
  font-family: 'Amatic SC', cursive;
  font-size: 1.8rem;
  color: var(--paper);
  letter-spacing: 0.02em;
}
.logo em {
  color: var(--accent2);
  font-style: normal;
}

.session-badge {
  display: flex; align-items: center; gap: 8px;
  background: var(--accent);
  border: 2px solid var(--paper);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 0.7rem;
  font-weight: 800;
  color: white;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.dot {
  width: 7px; height: 7px;
  background: white; border-radius: 50%;
  animation: blink 1.8s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── LEFT SIDEBAR ────────────────────────────────────────────── */
.sidebar-left {
  border-right: var(--border-thick);
  overflow-y: auto;
  padding: 14px 12px;
  display: flex; flex-direction: column; gap: 18px;
  background: var(--paper);
}
.sidebar-left::-webkit-scrollbar { width: 4px; }
.sidebar-left::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

.sec-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 900;
  color: var(--ink-soft);
  margin-bottom: 8px;
}

/* Category buttons — bold outlined pills */
.cat-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 11px;
  border-radius: var(--radius);
  cursor: pointer;
  border: var(--border);
  background: var(--paper);
  width: 100%; text-align: left;
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--ink);
  transition: all 0.12s;
}
.cat-btn:hover {
  transform: translate(-1px, -1px);
}
.cat-btn.active {
  background: var(--ink);
  color: white;
  transform: translate(1px, 1px);
}
.cat-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid var(--ink);
  flex-shrink: 0;
}
.cat-btn.active .cat-dot { border-color: white; }
.cat-count {
  font-size: 0.62rem; margin-left: auto; font-weight: 900;
  background: rgba(0,0,0,0.08); padding: 1px 6px; border-radius: 100px;
}
.cat-btn.active .cat-count { background: rgba(255,255,255,0.2); }

/* Sub-chips */
.sub-wrap { display:none; flex-wrap:wrap; gap:4px; padding: 5px 0 4px 18px; }
.sub-wrap.open { display:flex; }
.sub-chip {
  font-size: 0.66rem; padding: 3px 9px; border-radius: 100px;
  border: 2px solid var(--ink); background: var(--paper); cursor: pointer;
  color: var(--ink); font-family:'Nunito',sans-serif; font-weight: 700;
  transition: all 0.1s;
}
.sub-chip:hover { transform: translate(-1px,-1px); }
.sub-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

/* Color swatches */
.color-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }
.sw-wrap { position:relative; }
.swatch {
  width:100%; aspect-ratio:1; border-radius: 4px; cursor:pointer;
  border: var(--border);
  transition: all 0.12s;
}
.swatch:hover { transform: translate(-1px,-1px); }
.swatch.active { transform: translate(1px,1px); outline: 3px solid var(--accent); outline-offset: 2px; }
.sw-wrap:hover::after {
  content: attr(data-label);
  position:absolute; bottom:calc(100% + 6px); left:50%;
  transform:translateX(-50%);
  background: var(--ink); color: white;
  padding: 3px 8px; border-radius: 5px; font-size:0.62rem;
  font-weight:700; white-space:nowrap; z-index:99; pointer-events:none;
  font-family:'Nunito',sans-serif;
}

.clear-btn {
  border: var(--border); border-radius: var(--radius);
  padding: 8px 12px; font-family:'Nunito',sans-serif;
  font-size: 0.73rem; font-weight: 800;
  color: var(--ink); cursor: pointer;
  background: var(--bg);
  width: 100%; transition: all 0.12s;
  margin-top: 2px;
}
.clear-btn:hover { transform: translate(-1px,-1px); }

/* ── MAIN ────────────────────────────────────────────────────── */
main { display:flex; flex-direction:column; overflow:hidden; background: var(--bg); }

.prompt-bar {
  padding: 12px 18px;
  border-bottom: var(--border-thick);
  background: var(--accent2);
  flex-shrink: 0;
}
.prompt-txt {
  font-family: 'Amatic SC', cursive;
  font-size: 1.3rem;
  color: var(--ink);
  line-height: 1.4;
}
.prompt-btns { display:flex; gap:4px; flex-wrap:wrap; margin-top:8px; align-items:center; }
.pbtn {
  font-size: 0.66rem; padding: 4px 11px; border-radius: 100px;
  border: 2px solid var(--ink); background: rgba(255,255,255,0.7);
  cursor: pointer; color: var(--ink);
  font-family:'Nunito',sans-serif; font-weight: 800;
  transition: all 0.12s; box-shadow: 1.5px 1.5px 0 var(--ink);
}
.pbtn:hover { transform:translate(-1px,-1px); box-shadow: 2.5px 2.5px 0 var(--ink); }
.pbtn.active { background: var(--ink); color: white; transform:translate(1px,1px); box-shadow:none; }
.pbtn-sep { font-size: 1rem; color: var(--ink); opacity: 1; user-select:none; line-height:1; font-weight:900; }

.results-bar {
  padding: 6px 18px; font-size:0.7rem; font-weight:700;
  color: var(--ink-soft);
  border-bottom: 2px solid var(--ink);
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink: 0; background: var(--paper);
}

.grid-wrap { overflow-y:auto; flex:1; padding:14px 14px; }
.grid-wrap::-webkit-scrollbar { width:5px; }
.grid-wrap::-webkit-scrollbar-thumb { background: var(--muted); border-radius:3px; }

.pfp-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(108px,1fr));
  gap: 10px;
}

/* Cards — thick outline, flat shadow, lift on hover */
.pfp-card {
  border-radius: 5px;
  overflow: hidden;
  cursor: pointer;
  border: var(--border-thick);
  transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: var(--shadow);
  background: white;
  position: relative;
}
.pfp-card:hover {
  transform: translate(-2px,-3px);
  box-shadow: var(--shadow-lg);
}
.pfp-card.sel {
  border-color: var(--accent);
  box-shadow: 5px 5px 0 var(--accent);
  transform: translate(-2px,-2px);
}
.pfp-card.sel::after {
  content: '✓';
  position: absolute; top: 5px; right: 6px;
  background: var(--accent); color: white;
  width: 18px; height: 18px; border-radius: 50%;
  font-size: 0.65rem; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid white;
  line-height: 18px; text-align: center;
}
.pfp-card img {
  width:100%; aspect-ratio:1; object-fit:cover; display:block;
}
.pfp-cap {
  padding: 5px 7px; font-size: 0.65rem; font-weight: 700;
  color: var(--ink); text-align:center; line-height:1.3;
  text-transform:capitalize; background: white;
  border-top: 2px solid var(--ink);
}
.pfp-cap span { font-weight: 400; color: var(--ink-soft); }

.no-res {
  grid-column:1/-1; text-align:center; padding:48px;
  font-weight:700; color:var(--ink-soft); font-size:0.9rem;
}
.load-more-btn {
  grid-column:1/-1; background:var(--paper);
  border: var(--border); border-radius: var(--radius);
  padding: 10px; font-family:'Nunito',sans-serif;
  font-size: 0.75rem; font-weight:800; color:var(--ink);
  cursor: pointer; transition:all 0.12s;
  box-shadow: var(--shadow); margin-top:4px; width:100%;
}
.load-more-btn:hover { transform:translate(-1px,-2px); box-shadow:var(--shadow-lg); }

/* ── RIGHT SIDEBAR ───────────────────────────────────────────── */
.sidebar-right {
  border-left: var(--border-thick);
  overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 14px;
  background: var(--paper);
}
.sidebar-right::-webkit-scrollbar { width:4px; }
.sidebar-right::-webkit-scrollbar-thumb { background:var(--muted); border-radius:3px; }

/* Chosen box — big impact card */
.chosen-box {
  background: var(--paper);
  border-radius: var(--radius);
  border: var(--border-thick);
  padding: 16px; text-align:center;
  min-height: 155px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
}
.chosen-img {
  width: 82px; height: 82px; border-radius: 50%;
  overflow: hidden;
  border: var(--border-thick);
  background: var(--bg);
}
.chosen-img img { width:100%; height:100%; object-fit:cover; }
.chosen-name {
  font-family: 'Amatic SC', cursive;
  font-size: 1.4rem; font-weight: 700; color: var(--ink); text-transform:capitalize;
  line-height: 1.2;
}
.chosen-color-dot {
  display: inline-block;
  width: 13px; height: 13px;
  border-radius: 50%;
  border: 2px solid var(--ink);
}
.chosen-color-pill {
  display: inline-block;
  padding: 2px 10px; border-radius:100px;
  border: 2px solid var(--ink);
  font-size: 0.65rem; font-weight:800; text-transform:capitalize;
  background: white;
}
.empty-hint {
  font-size: 0.78rem; font-weight:600; color:var(--ink-soft);
  line-height: 1.7; font-style:italic;
}

/* Note area */
.note-wrap textarea {
  width:100%; height:80px; resize:none; padding:9px 11px;
  border: var(--border); border-radius: var(--radius); outline:none;
  font-family:'Nunito',sans-serif; font-size:0.77rem;
  font-weight:600; color:var(--ink);
  background:var(--paper); line-height:1.6;
  transition: border-color 0.15s;
}
.note-wrap textarea:focus { border-color: var(--accent); }
.note-wrap textarea::placeholder { color:var(--muted); font-style:italic; }

.btn-save {
  background: var(--ink); color: white; border: var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:900;
  cursor: pointer; width:100%; transition:all 0.12s;
  box-shadow: var(--shadow); margin-top:6px;
  text-transform: uppercase; letter-spacing:0.05em;
}
.btn-save:hover { background: var(--accent); border-color:var(--accent); transform:translate(-1px,-2px); box-shadow:var(--shadow-lg); }

/* Log */
.log-header { display:flex; align-items:center; }
.log-count {
  background: var(--accent); color:white;
  padding: 2px 8px; border-radius:100px;
  font-size: 0.62rem; font-weight:900;
  margin-left:auto; border: 2px solid var(--ink);
}
.log-list { display:flex; flex-direction:column; gap:6px; max-height:195px; overflow-y:auto; }
.log-list::-webkit-scrollbar { width:3px; }
.log-entry {
  background: var(--paper); border: var(--border); border-radius: var(--radius);
  display:flex; align-items:center; gap:8px; padding:7px 9px;
  animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
.log-thumb {
  width:34px; height:34px; border-radius:50%; overflow:hidden;
  flex-shrink:0; background:var(--bg);
  border: 2px solid var(--ink);
}
.log-thumb img { width:100%; height:100%; object-fit:cover; }
.log-info { flex:1; min-width:0; }
.log-em { font-size:0.73rem; font-weight:800; text-transform:capitalize; }
.log-t { font-size:0.63rem; color:var(--ink-soft); font-weight:600; }
.log-n { font-size:0.65rem; color:var(--ink-soft); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.btn-export {
  background: var(--bg); border: var(--border); border-radius: var(--radius);
  padding: 8px 14px; font-family:'Nunito',sans-serif; font-size:0.72rem;
  font-weight:800; color:var(--ink); cursor:pointer; width:100%;
  transition:all 0.12s; box-shadow: var(--shadow);
}
.btn-export:hover { transform:translate(-1px,-2px); box-shadow:var(--shadow-lg); }
.btn-pdf {
  background: var(--accent2); color: var(--ink); border: var(--border);
  box-shadow: var(--shadow);
}
.btn-pdf:hover { transform:translate(-1px,-2px); box-shadow:var(--shadow-lg); }

/* ── Tablet ─────────────────────────────────────────────── */
@media (min-width: 640px) and (max-width: 1023px) {
  body { grid-template-columns: 190px 1fr 230px; }
}

/* ── Mobiel: categorie-chips strip ───────────────────────── */
.mobile-cats { display: none; }

/* ── Mobiel: floating vastlegbalk ────────────────────────── */
.mobile-save-bar { display: none; }

@media (max-width: 639px) {
  /* Categorie-chips boven het grid */
  .mobile-cats {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 8px 12px;
    border-bottom: 2px solid var(--ink);
    background: var(--paper);
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .mobile-cats::-webkit-scrollbar { display: none; }
  .mcat-chip {
    flex-shrink: 0;
    border: 2px solid var(--ink);
    border-radius: 100px;
    padding: 5px 13px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.7rem; font-weight: 800;
    cursor: pointer;
    background: white;
    color: var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
    transition: all 0.12s;
  }
  .mcat-chip.active {
    background: var(--chip-col, var(--ink));
    color: white;
    transform: translate(1px, 1px);
    box-shadow: none;
  }
  .mcat-chip-all.active {
    background: var(--ink);
    color: white;
  }

  /* Floating vastlegbalk */
  .mobile-save-bar {
    display: flex;
    position: fixed;
    bottom: calc(58px + env(safe-area-inset-bottom, 0px));
    left: 0; right: 0;
    background: var(--ink);
    border-top: 3px solid var(--accent);
    padding: 10px 14px;
    gap: 10px;
    align-items: center;
    z-index: 150;
    transform: translateY(110%);
    transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }
  .mobile-save-bar.visible { transform: translateY(0); }
  .msb-thumb {
    width: 46px; height: 46px; border-radius: 50%;
    overflow: hidden; border: 2.5px solid white;
    flex-shrink: 0;
  }
  .msb-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .msb-label {
    flex: 1; color: white; font-weight: 800;
    font-size: 0.9rem; text-transform: capitalize;
  }
  .msb-btn {
    background: var(--accent); border: 2px solid white;
    border-radius: var(--radius); color: white;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 0.72rem; padding: 9px 12px;
    cursor: pointer; white-space: nowrap;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  }

  /* Extra ruimte onderaan het grid zodat de floating bar niets verbergt */
  .grid-wrap { padding-bottom: 90px; }
}

/* ── Mobiel navigatie ────────────────────────────────────── */
.mobile-nav { display: none; }

@media (max-width: 639px) {
  html, body { overflow: hidden; }
  body {
    height: 100vh;
    height: 100dvh;
    grid-template-columns: 1fr;
    grid-template-rows: 54px 1fr calc(58px + env(safe-area-inset-bottom, 16px));
  }
  header { grid-column: 1; grid-row: 1; }
  .sidebar-left  { grid-column: 1; grid-row: 2; display: none; border-right: none; }
  main           { grid-column: 1; grid-row: 2; display: none; }
  .sidebar-right { grid-column: 1; grid-row: 2; display: none; border-left: none; }
  .sidebar-left.tab-active  { display: flex; }
  main.tab-active            { display: flex; }
  .sidebar-right.tab-active { display: flex; }
  .mobile-nav {
    display: flex;
    grid-column: 1; grid-row: 3;
    background: var(--ink);
    border-top: var(--border-thick);
    z-index: 200;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .mobile-nav button {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    border: none; background: transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 0.6rem; font-weight: 800;
    color: rgba(255,255,255,0.5);
    cursor: pointer; transition: color 0.15s; padding: 6px 0;
  }
  .mobile-nav button.active { color: var(--accent2); }
  .mobile-nav button svg { width: 22px; height: 22px; }
  .pfp-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
  .prompt-btns { gap: 3px; }
  .pbtn { font-size: 0.6rem; padding: 3px 9px; }
  #mobileLogBadge {
    background: var(--accent); color: white; border-radius: 10px;
    padding: 0 5px; font-size: 0.55rem; margin-left: 2px; vertical-align: middle;
    display: none;
  }
}

/* ── Print / PDF ─────────────────────────────────────────── */
#print-view { display: none; grid-column: 1 / -1; }

@media print {
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body > *:not(#print-view) { display: none !important; }
  #print-view {
    display: block !important;
    font-family: 'Nunito', sans-serif;
    color: #111111;
  }
  .pv-title {
    font-family: 'Amatic SC', cursive;
    font-size: 2rem; margin-bottom: 4px;
  }
  .pv-title em { color: #FF5C35; font-style: normal; }
  .pv-date {
    font-size: 0.78rem; color: #444444; font-weight: 700;
    margin-bottom: 24px; padding-bottom: 12px;
    border-bottom: 2.5px solid #111111;
  }
  .pv-entry {
    display: flex; gap: 20px; align-items: center;
    margin-bottom: 20px; padding-bottom: 20px;
    border-bottom: 2px solid #111111;
    break-inside: avoid; page-break-inside: avoid;
  }
  .pv-entry:last-child { border-bottom: none; }
  .pv-img {
    width: 110px; height: 110px; border-radius: 50%;
    overflow: hidden; flex-shrink: 0;
    border: 3px solid #111111;
    box-shadow: 4px 4px 0 #111111;
  }
  .pv-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pv-body { flex: 1; }
  .pv-label {
    font-size: 0.68rem; font-weight: 800; color: #FF5C35;
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px;
  }
  .pv-emotion {
    font-family: 'Amatic SC', cursive;
    font-size: 2.2rem; font-weight: 700;
    text-transform: capitalize; line-height: 1;
    margin-bottom: 8px; color: #111111;
  }
  .pv-note {
    font-size: 0.78rem; background: #F7F5EE; padding: 7px 12px;
    border-radius: 6px; border-left: 3px solid #FF5C35;
    line-height: 1.5; font-weight: 600; margin-bottom: 6px;
    font-style: italic;
  }
  .pv-time { font-size: 0.62rem; color: #888888; font-weight: 700; }
}

/* ── Nieuwe sessie knop ──────────────────────────────────── */
.btn-new-session {
  background: transparent;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 100px;
  padding: 4px 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.7rem; font-weight: 800;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: all 0.15s;
}
.btn-new-session:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.6);
  color: white;
}

/* ── Zoekbalk ─────────────────────────────────────────────── */
.search-wrap {
  position: relative; display: flex; align-items: center;
}
.search-wrap input {
  width: 100%; padding: 8px 32px 8px 10px;
  border: var(--border); border-radius: var(--radius);
  font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 600;
  background: white; color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--ink); }
.search-wrap input::placeholder { color: #aaa; font-weight: 400; }
#searchClear {
  position: absolute; right: 8px;
  background: none; border: none; cursor: pointer;
  font-size: 0.8rem; font-weight: 900; color: var(--ink-soft);
  display: none; padding: 2px 4px; line-height: 1;
}
#searchClear:hover { color: var(--ink); }

/* ── Stappenbalk ─────────────────────────────────────────── */
.step-track {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
}
.step-track-bar {
  flex: 1; height: 5px; background: rgba(0,0,0,0.12);
  border-radius: 3px; overflow: hidden; border: 1px solid rgba(0,0,0,0.15);
}
.step-track-fill {
  height: 100%; background: var(--ink);
  border-radius: 3px; transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
}
.step-meta {
  font-size: 0.68rem; font-weight: 900; color: var(--ink);
  white-space: nowrap; letter-spacing: 0.04em;
}
.step-pills {
  display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px;
}
.step-pill {
  font-size: 0.62rem; padding: 3px 10px; border-radius: 100px;
  border: 2px solid var(--ink); font-family: 'Nunito', sans-serif;
  font-weight: 800; color: var(--ink); background: rgba(255,255,255,0.5);
  display: flex; align-items: center; gap: 3px;
}
.step-pill.done  { background: var(--ink); color: white; }
.step-pill.active { background: var(--accent2); border-color: var(--ink); box-shadow: 1.5px 1.5px 0 var(--ink); }

/* ── Naam-veld ───────────────────────────────────────────── */
.name-wrap input {
  width: 100%; padding: 8px 11px;
  border: var(--border); border-radius: var(--radius);
  font-family: 'Nunito', sans-serif; font-size: 0.77rem;
  font-weight: 600; color: var(--ink);
  background: var(--paper); outline: none;
  transition: border-color 0.15s;
}
.name-wrap input:focus { border-color: var(--accent); }
.name-wrap input::placeholder { color: var(--muted); font-style: italic; }

/* ── Afsluitscherm ───────────────────────────────────────── */
#closing-screen {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: var(--bg); overflow-y: auto;
  padding: 36px 24px 48px;
  flex-direction: column; align-items: center;
}
.closing-header { text-align: center; margin-bottom: 28px; }
.closing-title {
  font-family: 'Amatic SC', cursive;
  font-size: 2.4rem; font-weight: 700; color: var(--ink); line-height: 1.2; margin-bottom: 6px;
}
.closing-subtitle { font-size: 0.78rem; color: var(--ink-soft); font-weight: 600; }
.closing-entries {
  display: flex; flex-wrap: wrap; gap: 14px;
  justify-content: center; max-width: 820px; width: 100%; margin-bottom: 28px;
}
.closing-entry {
  background: var(--paper); border: var(--border-thick); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 14px; text-align: center;
  width: 134px; display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.closing-step-lbl {
  font-size: 0.6rem; font-weight: 900; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--accent);
}
.closing-img {
  width: 80px; height: 80px; border-radius: 50%;
  overflow: hidden; border: var(--border-thick); background: var(--bg);
  display: block; flex-shrink: 0;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
}
.closing-img:hover { transform: scale(1.08) translateY(-2px); box-shadow: 3px 3px 0 var(--ink); }
.closing-img:hover::after {
  content: '↗'; position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center;
  background: rgba(28,24,20,0.45); color: white;
  font-size: 1.6rem; border-radius: 50%;
}
.closing-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.closing-emotion {
  font-family: 'Amatic SC', cursive; font-size: 1.25rem; font-weight: 700;
  text-transform: capitalize; color: var(--ink); line-height: 1.1;
}
.closing-note {
  font-size: 0.62rem; color: var(--ink-soft); font-style: italic; line-height: 1.4;
}
.closing-empty {
  width: 134px; background: var(--bg); border: 2px dashed var(--muted);
  border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 6px; padding: 14px; min-height: 172px;
}
.closing-empty-lbl {
  font-size: 0.6rem; font-weight: 900; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);
}
.closing-empty-dash { font-size: 1.5rem; color: var(--muted); }
.closing-actions {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
}
.closing-actions .btn-save,
.closing-actions .btn-share-atlas,
.closing-actions .btn-restart {
  width: auto; min-width: 220px;
}

/* ── Pijltje in knoppen ─────────────────────────────────── */
.arr { font-size: 1.4em; line-height: 0; vertical-align: middle; }

/* ── Deel-knoppen ────────────────────────────────────────── */
.share-btn-sm {
  background: var(--paper); border: var(--border);
  border-radius: var(--radius); padding: 6px 14px;
  font-family: 'Nunito', sans-serif; font-size: 0.65rem; font-weight: 900;
  cursor: pointer; color: var(--ink); transition: all 0.12s;
  letter-spacing: 0.04em; box-shadow: 2px 2px 0 var(--ink);
  text-transform: uppercase;
}
.share-btn-sm:hover { background: var(--accent); border-color: var(--accent); color: white; transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
.btn-share-atlas {
  background: var(--accent2); color: var(--ink);
  border: var(--border); border-radius: var(--radius);
  padding: 10px 20px; font-family: 'Nunito', sans-serif;
  font-size: 0.78rem; font-weight: 900; cursor: pointer;
  transition: all 0.12s; box-shadow: var(--shadow);
  min-width: 210px; text-transform: uppercase; letter-spacing: 0.05em;
}
.btn-share-atlas:hover { transform: translate(-1px,-2px); box-shadow: var(--shadow-lg); }
.btn-share-atlas:disabled { opacity: 0.6; cursor: wait; transform: none; }
.btn-restart {
  background: var(--bg); color: var(--ink);
  border: var(--border); border-radius: var(--radius);
  padding: 10px 20px; font-family: 'Nunito', sans-serif;
  font-size: 0.78rem; font-weight: 900; cursor: pointer;
  transition: all 0.12s; box-shadow: var(--shadow);
  text-transform: uppercase; letter-spacing: 0.05em;

function renderCats() {
  var el = document.getElementById('catFilters');
  var html = '';
  CATS.forEach(function(cat) {
    var imgs = IMAGES.filter(function(i) { return i.cat === cat.id; });
    var seen = {}; var subEmots = [];
    imgs.forEach(function(i) { if (!seen[i.emotion]) { seen[i.emotion]=true; subEmots.push(i.emotion); } });
    subEmots.sort();
    var isActive = activeCats.has(cat.id);
    html += '<div style="margin-bottom:4px">';
    html += '<button class="cat-btn '+(isActive?'active':'')+'" onclick="toggleCat(\''+cat.id+'\')">';
    html += '<span class="cat-dot" style="background:'+cat.color+'"></span>';
    html += cat.label;
    html += '<span class="cat-count">'+imgs.length+'</span>';
    html += '</button>';
    html += '<div class="sub-wrap '+(isActive?'open':'')+'" id="sub_'+cat.id+'">';
    subEmots.forEach(function(e) {
      var enc = encodeURIComponent(e);
      var isEm = emotionFilter === e;
      html += '<button class="sub-chip '+(isEm?'active':'')+'" onclick="filterEmotion(event,\''+enc+'\')">'+e+'</button>';
    });
    html += '</div></div>';
  });
  el.innerHTML = html;
  renderMobileCats();
}

function renderMobileCats() {
  var el = document.getElementById('mobileCats');
  if (!el) return;
  var allActive = activeCats.size === 0;
  var html = '<button class="mcat-chip mcat-chip-all'+(allActive?' active':'')+'" onclick="clearAll()">Alle</button>';
  CATS.forEach(function(cat) {
    var isActive = activeCats.has(cat.id);
    // Korte labels voor de chips
    var shortLabel = cat.id.charAt(0).toUpperCase() + cat.id.slice(1);
    html += '<button class="mcat-chip'+(isActive?' active':'')+'" style="--chip-col:'+cat.color+'" onclick="toggleCat(\''+cat.id+'\')">'+shortLabel+'</button>';
  });
  el.innerHTML = html;
}

function updateMobileSaveBar() {
  var bar = document.getElementById('mobileSaveBar');
  if (!bar) return;
  if (selectedImg) {
    document.getElementById('msbThumb').innerHTML = '<img src="'+selectedImg.url+'" alt="'+selectedImg.emotion+'">';
    document.getElementById('msbLabel').textContent = selectedImg.emotion;
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}

function renderColors() {
  var el = document.getElementById('colorGrid');
  var html = '';
  Object.keys(COLORS).forEach(function(k) {
    var hex = COLORS[k];
    html += '<div class="sw-wrap" data-label="'+k+'">';
    html += '<div class="swatch '+(activeColors.has(k)?'active':'')+'" style="background:'+hex+'" onclick="toggleColor(\''+k+'\')"></div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

function getFiltered() {
  return IMAGES.filter(function(img) {
    var catOk    = activeCats.size === 0   || activeCats.has(img.cat);
    var colorOk  = activeColors.size === 0 || activeColors.has(img.color);
    var emotOk   = !emotionFilter          || img.emotion === emotionFilter;
    var searchOk = !searchFilter           || img.emotion.toLowerCase().includes(searchFilter);
    return catOk && colorOk && emotOk && searchOk;
  });
}

function renderGrid() {
  var grid = document.getElementById('pfpGrid');
  var filtered = getFiltered();
  var shown = filtered.slice(0, displayCount);

  if (emotionFilter) {
    document.getElementById('resMeta').textContent = '"'+emotionFilter+'" — '+filtered.length+' gevonden';
  } else if (filtered.length === IMAGES.length) {
    document.getElementById('resMeta').textContent = 'Alle '+IMAGES.length+' afbeeldingen';
  } else {
    document.getElementById('resMeta').textContent = filtered.length+' gevonden';
  }
  document.getElementById('resExtra').textContent = filtered.length > displayCount ? displayCount+' getoond' : '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-res">Geen afbeeldingen voor deze filters.</div>';
    return;
  }

  var html = '';
  shown.forEach(function(img) {
    var isSel = selectedImg && selectedImg.f === img.f;
    html += '<div class="pfp-card '+(isSel?'sel':'')+'" onclick="selectImg(\''+img.f+'\')">';
    html += '<img src="'+img.url+'" alt="'+img.emotion+'" loading="lazy">';
    html += '<div class="pfp-cap">'+img.emotion+'<br><span>'+img.color+'</span></div>';
    html += '</div>';
  });

  if (filtered.length > displayCount) {
    html += '<button class="load-more-btn" onclick="loadMore()">+ Meer laden ('+(filtered.length - displayCount)+' overig)</button>';
  }

  grid.innerHTML = html;
}

function loadMore() { displayCount += PAGE_SIZE; renderGrid(); }

function toggleCat(id) {
  emotionFilter = null;
  if (activeCats.has(id)) activeCats.delete(id); else activeCats.add(id);
  displayCount = PAGE_SIZE;
  renderCats(); renderGrid();
}

function filterEmotion(e, enc) {
  e.stopPropagation();
  var emotion = decodeURIComponent(enc);
  emotionFilter = (emotionFilter === emotion) ? null : emotion;
  displayCount = PAGE_SIZE;
  renderCats(); renderGrid();
}

function toggleColor(k) {
  if (activeColors.has(k)) activeColors.delete(k); else activeColors.add(k);
  displayCount = PAGE_SIZE;
  renderColors(); renderGrid();
}

function onSearch() {
  searchFilter = document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('searchClear').style.display = searchFilter ? 'block' : 'none';
  displayCount = PAGE_SIZE;
  renderGrid();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchFilter = '';
  document.getElementById('searchClear').style.display = 'none';
  displayCount = PAGE_SIZE;
  renderGrid();
}

function clearAll() {
  activeCats.clear(); activeColors.clear();
  emotionFilter = null; displayCount = PAGE_SIZE;
  clearSearch();
  renderCats(); renderColors(); renderGrid();
}

function selectImg(filename) {
  if (selectedImg && selectedImg.f === filename) {
    selectedImg = null;
    document.querySelectorAll('.pfp-card').forEach(function(el) { el.classList.remove('sel'); });
    renderChosen();
    return;
  }
  selectedImg = null;
  for (var i = 0; i < IMAGES.length; i++) {
    if (IMAGES[i].f === filename) { selectedImg = IMAGES[i]; break; }
  }
  document.querySelectorAll('.pfp-card').forEach(function(el) { el.classList.remove('sel'); });
  document.querySelectorAll('.pfp-card').forEach(function(card) {
    var img = card.querySelector('img');
    if (img && img.src.indexOf(filename) !== -1) card.classList.add('sel');
  });
  renderChosen();
}

function renderChosen() {
  var box = document.getElementById('chosenBox');
  if (!selectedImg) {
    box.innerHTML = '<div class="empty-hint">'+currentPromptHint+'</div>';
    updateMobileSaveBar();
    return;
  }
  var colorHex = COLORS[selectedImg.color] || '#ccc';
  box.innerHTML =
    '<div class="chosen-img" style="background:'+colorHex+'33">' +
    '<img src="'+selectedImg.url+'" alt="'+selectedImg.emotion+'">' +
    '</div>' +
    '<div class="chosen-name">'+selectedImg.emotion+'</div>' +
    '<span class="chosen-color-dot" style="background:'+colorHex+'"></span>';
  updateMobileSaveBar();
}

function setPrompt(btn, txt) {
  document.getElementById('promptTxt').textContent = '"'+txt+'"';
  document.querySelectorAll('.pbtn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentPromptHint = txt;
  if (!selectedImg) renderChosen();
}

function renderProgress() {
  var step = STEPS[currentStep];
  document.getElementById('promptTxt').textContent = '"' + step.question + '"';
  currentPromptHint = step.hint;
  if (!selectedImg) renderChosen();

  var pct = (currentStep / STEPS.length) * 100;
  document.getElementById('stepFill').style.width = pct + '%';
  document.getElementById('stepMeta').textContent = 'Stap ' + (currentStep + 1) + ' van ' + STEPS.length;

  var html = '';
  STEPS.forEach(function(s, i) {
    var isDone   = i < currentStep;
    var isActive = i === currentStep;
    var cls = isDone ? 'done' : (isActive ? 'active' : '');
    html += '<div class="step-pill ' + cls + '">';
    if (isDone) html += '✓ ';
    html += s.label + '</div>';
  });
  document.getElementById('stepPills').innerHTML = html;

  var isLast = currentStep === STEPS.length - 1;
  var btn = document.getElementById('btnSave');
  if (btn) btn.textContent = isLast ? 'Vastleggen & afronden' : 'Vastleggen & verder';
}

function logMoment() {
  if (!selectedImg) { alert('Selecteer eerst een afbeelding.'); return; }
  var note = document.getElementById('noteInput').value.trim();
  var t = new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
  sessionLog.push({
    img: selectedImg,
    note: note,
    time: t,
    prompt: '"' + STEPS[currentStep].question + '"',
    stepLabel: STEPS[currentStep].label,
    stepIndex: currentStep
  });
  document.getElementById('noteInput').value = '';
  selectedImg = null;

  // Reset alle filters zodat de volgende stap fris begint
  activeCats.clear();
  activeColors.clear();
  emotionFilter = null;
  searchFilter = '';
  displayCount = PAGE_SIZE;
  var searchInput = document.getElementById('searchInput');
  if (searchInput) searchInput.value = '';
  var searchClear = document.getElementById('searchClear');
  if (searchClear) searchClear.style.display = 'none';

  shuffleImages();
  renderChosen();
  renderCats();
  renderColors();
  renderGrid();
  renderLog();

  // Scroll grid terug naar boven
  var gridWrap = document.querySelector('.grid-wrap');
  if (gridWrap) gridWrap.scrollTop = 0;

  currentStep++;
  if (currentStep >= STEPS.length) {
    showClosingScreen();
  } else {
    renderProgress();
    if (window.innerWidth < 640) switchTab('afbeeldingen');
  }
}

function renderLog() {
  var list = document.getElementById('logList');
  document.getElementById('logCount').textContent = sessionLog.length;
  if (!sessionLog.length) {
    list.innerHTML = '<div class="empty-hint" style="padding:6px 0;font-size:0.72rem;">Nog niets vastgelegd.</div>';
    var b0 = document.getElementById('mobileLogBadge'); if (b0) b0.style.display = 'none';
    return;
  }
  var html = '';
  sessionLog.slice().reverse().forEach(function(e) {
    html += '<div class="log-entry">';
    html += '<div class="log-thumb"><img src="'+e.img.url+'" alt="'+e.img.emotion+'" loading="lazy"></div>';
    html += '<div class="log-info">';
    html += '<div class="log-em">'+e.img.emotion+'</div>';
    html += '<div class="log-t">'+e.time+'</div>';
    if (e.note) html += '<div class="log-n">'+e.note+'</div>';
    html += '</div></div>';
  });
  list.innerHTML = html;
  var b = document.getElementById('mobileLogBadge');
  if (b) { b.textContent = sessionLog.length; b.style.display = 'inline'; }
}

function showClosingScreen() {
  var nameVal = (document.getElementById('nameInput') || {}).value || '';
  nameVal = nameVal.trim();
  var d = new Date().toLocaleDateString('nl-NL', {day:'2-digit', month:'long', year:'numeric'});
  var subtitle = nameVal ? 'Voor: ' + nameVal + ' — ' + d : d;
  document.getElementById('closingSubtitle').textContent = subtitle;

  var html = '';
  STEPS.forEach(function(s, i) {
    var entry = null;
    for (var j = 0; j < sessionLog.length; j++) {
      if (sessionLog[j].stepIndex === i) { entry = sessionLog[j]; break; }
    }
    if (entry) {
      var entryCol = COLORS[entry.img.color] || '#C8C2B4';
      html += '<div class="closing-entry" style="background:'+entryCol+'22">';
      html += '<div class="closing-step-lbl">' + s.label + '</div>';
      html += '<a class="closing-img" href="' + entry.img.url + '" target="_blank" rel="noopener" title="Open als profielfoto" style="background:'+entryCol+'55"><img src="' + entry.img.url + '" alt="' + entry.img.emotion + '"></a>';
      html += '<div class="closing-emotion">' + entry.img.emotion + '</div>';
      if (entry.note) html += '<div class="closing-note">' + entry.note + '</div>';
      html += '<button class="share-btn-sm" onclick="shareStep(' + i + ')">Deel <span class="arr">›</span></button>';
      html += '</div>';
    } else {
      html += '<div class="closing-empty">';
      html += '<div class="closing-empty-lbl">' + s.label + '</div>';
      html += '<div class="closing-empty-dash">—</div>';
      html += '</div>';
    }
  });
  document.getElementById('closingEntries').innerHTML = html;
  document.getElementById('closing-screen').style.display = 'flex';
}

function exportSession() {
  if (!sessionLog.length) { alert('Nog niets te exporteren.'); return; }
  var d = new Date().toLocaleDateString('nl-NL');
  var lines = ['GevoelsAtlas — Sessieoverzicht', 'Datum: '+d, '─'.repeat(36)];
  sessionLog.forEach(function(e,i) {
    var line = (i+1)+'. ['+e.time+'] '+e.img.emotion+' ('+e.img.color+')\n   Prompt: '+e.prompt;
    if (e.note) line += '\n   Notitie: '+e.note;
    lines.push(line);
  });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lines.join('\n\n')],{type:'text/plain'}));
  a.download = 'gevoelsatlas-'+d.replace(/\//g,'-')+'.txt';
  a.click();
}

function nieuweSessie() {
  if (sessionLog.length > 0) {
    var bevestig = 'Nieuwe sessie starten? De huidige sessie (' + sessionLog.length + ' moment' + (sessionLog.length !== 1 ? 'en' : '') + ') wordt gewist.';
    if (!confirm(bevestig)) return;
  }
  sessionLog = [];
  selectedImg = null;
  currentStep = 0;
  activeCats.clear(); activeColors.clear();
  emotionFilter = null; displayCount = PAGE_SIZE;
  clearSearch();
  document.getElementById('noteInput').value = '';
  var ni = document.getElementById('nameInput'); if (ni) ni.value = '';
  document.getElementById('closing-screen').style.display = 'none';
  renderProgress();
  renderCats(); renderColors(); renderGrid();
  renderChosen(); renderLog();
}

/* ── Mobiele tab-navigatie ── */
var activeTab = 'afbeeldingen';

function switchTab(tab) {
  activeTab = tab;
  var panels = { filters: '.sidebar-left', afbeeldingen: 'main', sessie: '.sidebar-right' };
  Object.keys(panels).forEach(function(t) {
    document.querySelector(panels[t]).classList.toggle('tab-active', t === tab);
  });
  document.querySelectorAll('.mobile-nav button').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
}

/* ── PDF export ── */
function exportPDF() {
  if (!sessionLog.length) { alert('Nog niets te exporteren.'); return; }
  var d = new Date().toLocaleDateString('nl-NL', {day:'2-digit', month:'long', year:'numeric'});
  var nameVal = (document.getElementById('nameInput') || {}).value || '';
  nameVal = nameVal.trim();
  var pv = document.getElementById('print-view');
  var html = '<div class="pv-title">Gevoels<em>Atlas</em></div>';
  if (nameVal) html += '<div class="pv-name">' + nameVal + '</div>';
  html += '<div class="pv-date">' + d + '</div>';
  sessionLog.forEach(function(e) {
    var label = e.stepLabel || e.prompt.replace(/"/g, '').trim();
    html += '<div class="pv-entry">';
    html += '<div class="pv-img"><img src="' + e.img.url + '" alt="' + e.img.emotion + '"></div>';
    html += '<div class="pv-body">';
    html += '<div class="pv-label">' + label + '</div>';
    html += '<div class="pv-emotion">' + e.img.emotion + '</div>';
    if (e.note) html += '<div class="pv-note">' + e.note + '</div>';
    html += '<div class="pv-time">' + e.time + '</div>';
    html += '</div></div>';
  });
  pv.innerHTML = html;
  /* Wacht tot afbeeldingen geladen zijn, dan printen */
  var imgs = pv.querySelectorAll('img');
  var total = imgs.length, loaded = 0;
  var origTitle = document.title;
  document.title = nameVal ? 'GevoelsAtlas — ' + nameVal : 'GevoelsAtlas';
  function tryPrint() {
    loaded++;
    if (loaded === total) {
      window.print();
      document.title = origTitle;
    }
  }
  if (!total) { window.print(); document.title = origTitle; return; }
  imgs.forEach(function(img) {
    if (img.complete) tryPrint();
    else { img.onload = tryPrint; img.onerror = tryPrint; }
  });
}

/* ── Proxy-URL: zelfde domein zodat canvas de afbeelding mag tekenen ── */
function proxyUrl(url) {
  return url.replace('/images/', '/images/');
}

/* ── Delen: individueel gevoel ───────────────────────────── */
function shareStep(stepIndex) {
  for (var j = 0; j < sessionLog.length; j++) {
    if (sessionLog[j].stepIndex === stepIndex) {
      var e = sessionLog[j];
      var hint = STEPS[stepIndex] ? STEPS[stepIndex].hint : '';
      buildSingleCard(e.img.url, e.img.emotion, hint, function(canvas) {
        shareOrDownloadCanvas(canvas, 'gevoel-' + e.img.emotion + '.png');
      });
      return;
    }
  }
}

/* ── Delen: volledige GevoelsAtlas-kaart ─────────────────── */
function shareAtlasCard() {
  var btn = document.getElementById('btnShareAtlas');
  if (btn) { btn.textContent = 'Even laden…'; btn.disabled = true; }
  buildAtlasCanvas(function(canvas) {
    if (btn) { btn.innerHTML = 'Deel jouw GevoelsAtlas <span class="arr">›</span>'; btn.disabled = false; }
    shareOrDownloadCanvas(canvas, 'mijn-gevoelsatlas.png');
  });
}

function shareOrDownloadCanvas(canvas, filename) {
  canvas.toBlob(function(blob) {
    var file = new File([blob], filename, { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: 'GevoelsAtlas', url: 'https://gevoelsatlas.netlify.app' })
        .catch(function() { downloadCanvas(canvas, filename); });
    } else {
      downloadCanvas(canvas, filename);
    }
  }, 'image/png');
}

function downloadCanvas(canvas, filename) {
  var a = document.createElement('a');
  a.download = filename || 'gevoelsatlas.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

/* ── Canvas: enkelvoudige kaart ─────────────────────────── */
function buildSingleCard(imgUrl, emotion, hint, callback) {
  document.fonts.ready.then(function() {
    var W = 800, H = 800;
    var canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    var ctx = canvas.getContext('2d');
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() { drawSingleCard(ctx, W, H, img, emotion, hint); callback(canvas); };
    img.onerror = function() { drawSingleCard(ctx, W, H, null, emotion, hint); callback(canvas); };
    img.src = proxyUrl(imgUrl);
  });
}

function drawSingleCard(ctx, W, H, img, emotion, hint) {
  ctx.fillStyle = '#FAF7F2'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#111'; ctx.lineWidth = 8;
  ctx.strokeRect(16, 16, W-32, H-32);

  // Hint bovenaan
  ctx.fillStyle = '#FF5C35'; ctx.font = '700 46px "Amatic SC"';
  ctx.textAlign = 'center';
  ctx.fillText(hint, W/2, 82);
  ctx.beginPath(); ctx.strokeStyle = '#111'; ctx.lineWidth = 3;
  ctx.moveTo(60, 100); ctx.lineTo(W-60, 100); ctx.stroke();

  var R = 210, cx = W/2, cy = 360;
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.clip();
  if (img) { ctx.drawImage(img, cx-R, cy-R, R*2, R*2); }
  else { ctx.fillStyle = '#E0D8CC'; ctx.fill(); }
  ctx.restore();
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = '#111'; ctx.lineWidth = 7; ctx.stroke();

  ctx.fillStyle = '#111'; ctx.font = '700 120px "Amatic SC"';
  ctx.textAlign = 'center';
  var tw = ctx.measureText(emotion).width;
  if (tw > W - 80) ctx.font = '700 ' + Math.floor(120*(W-80)/tw) + 'px "Amatic SC"';
  ctx.fillText(emotion, W/2, cy + R + 100);
}

/* ── Canvas: volledige atlas-kaart ──────────────────────── */
function buildAtlasCanvas(callback) {
  document.fonts.ready.then(function() {
    var W = 1080, H = 1080;
    var canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    var ctx = canvas.getContext('2d');
    var entries = [];
    STEPS.forEach(function(s, i) {
      for (var j = 0; j < sessionLog.length; j++) {
        if (sessionLog[j].stepIndex === i) { entries.push(sessionLog[j]); break; }
      }
    });
    if (!entries.length) { drawAtlasCard(ctx, W, H, entries, []); callback(canvas); return; }
    var loaded = 0;
    var imgs = entries.map(function(entry) {
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = img.onerror = function() {
        loaded++;
        if (loaded === entries.length) { drawAtlasCard(ctx, W, H, entries, imgs); callback(canvas); }
      };
      img.src = proxyUrl(entry.img.url);
      return img;
    });
  });
}

function drawAtlasCard(ctx, W, H, entries, imgs) {
  ctx.fillStyle = '#FAF7F2'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#111'; ctx.lineWidth = 10;
  ctx.strokeRect(20, 20, W-40, H-40);

  // Titel
  ctx.fillStyle = '#111'; ctx.font = '700 108px "Amatic SC"';
  ctx.textAlign = 'center';
  ctx.fillText('Mijn GevoelsAtlas', W/2, 148);

  // Datum
  var d = new Date().toLocaleDateString('nl-NL', {day:'2-digit', month:'long', year:'numeric'});
  ctx.font = '700 30px "Nunito"'; ctx.fillStyle = '#555';
  ctx.fillText(d, W/2, 194);

  // Lijn
  ctx.beginPath(); ctx.strokeStyle = '#111'; ctx.lineWidth = 4;
  ctx.moveTo(60, 220); ctx.lineTo(W-60, 220); ctx.stroke();

  // Cirkels
  var n = entries.length;
  var R = 80, D = R*2;
  var cy = 460;
  var startCX = n === 1 ? W/2 : 60 + R;
  var step = n > 1 ? (W - 120 - D) / (n-1) : 0;

  entries.forEach(function(entry, i) {
    var cx = startCX + i * step;
    var img = imgs[i];
    var imgCol = COLORS[entry.img.color] || '#C8C2B4';

    // Lichte kleurvulling als achtergrond van de cirkel
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.clip();
    ctx.fillStyle = imgCol + '55'; // ~33% opacity = lichte tint
    ctx.fillRect(cx-R, cy-R, D, D);
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, cx-R, cy-R, D, D);
    }
    ctx.restore();

    // Zwarte rand bovenop
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);
    ctx.strokeStyle = '#111'; ctx.lineWidth = 5; ctx.stroke();

    ctx.fillStyle = '#FF5C35'; ctx.font = '800 22px "Nunito"';
    ctx.textAlign = 'center';
    ctx.fillText(entry.stepLabel.toUpperCase(), cx, cy + R + 40);

    ctx.fillStyle = '#111'; ctx.font = '700 50px "Amatic SC"';
    var maxW = (n > 1 ? step : 300) - 16;
    var tw = ctx.measureText(entry.img.emotion).width;
    if (tw > maxW) ctx.font = '700 ' + Math.floor(50*maxW/tw) + 'px "Amatic SC"';
    ctx.fillText(entry.img.emotion, cx, cy + R + 94);
  });

  // Lijn onderaan
  ctx.beginPath(); ctx.strokeStyle = '#111'; ctx.lineWidth = 4;
  ctx.moveTo(60, H-88); ctx.lineTo(W-60, H-88); ctx.stroke();

  // Branding — rood, Amatic SC
  ctx.fillStyle = '#FF5C35'; ctx.font = '700 48px "Amatic SC"';
  ctx.textAlign = 'center';
  ctx.fillText('gevoelsatlas.netlify.app', W/2, H-38);
}

renderProgress(); renderCats(); renderColors(); renderGrid();
if (window.innerWidth < 640) switchTab('afbeeldingen');

  navigator.serviceWorker.register('sw.js').catch(function(){});
}
